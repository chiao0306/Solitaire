<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語接龍🐉</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1117; color: #fafafa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        .container { width: 100%; max-width: 600px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #fff; }
        
        .panel { background: #262730; border-radius: 12px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #ccc; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #4b5563; background: #0e1117; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #ff4b4b; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        /* 💡 新增：鎖定按鈕的樣式 */
        button:disabled { background: #374151 !important; color: #9ca3af !important; cursor: not-allowed; border: none; }
        
        .btn-primary { background: #ff4b4b; } .btn-primary:hover { background: #ff3333; }
        .btn-dark { background: #31333f; border: 1px solid #4b5563; }
        .btn-danger { background: #dc2626; }
        
        #game-screen { display: none; }
        .chat-box { background: #1a1c23; border-radius: 10px; padding: 15px; height: 380px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #31333f; }
        .msg { margin-bottom: 12px; padding: 12px; border-radius: 10px; background: #31333f; font-size: 15px; line-height: 1.4; }
        .msg.system { background: rgba(30, 58, 138, 0.4); border-left: 4px solid #3b82f6; color: #93c5fd; }
        .msg.referee { background: rgba(63, 98, 18, 0.4); border-left: 4px solid #84cc16; color: #d9f99d; }
        .msg.join { background: transparent; color: #888; font-size: 13px; text-align: center; padding: 5px; }
        /* 💡 新增：遊戲結束訊息樣式 */
        .msg.game_over { background: rgba(220, 38, 38, 0.2); border: 1px dashed #dc2626; color: #fca5a5; text-align: center; font-weight: bold; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .controls input { margin-bottom: 0; }
        
        /* 歷史紀錄標籤按鈕樣式 */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: -10px; margin-bottom: 20px; }
        .chip { background: #31333f; border: 1px solid #4b5563; padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; transition: 0.2s; color: #ccc; user-select: none; }
        .chip:hover { background: #4b5563; color: white; }
        .chip.active { background: #ff4b4b; border-color: #ff4b4b; color: white; }

        dialog { background: #262730; color: white; border: 1px solid #4b5563; border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        .dialog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .close-btn { background: transparent; color: #ccc; width: auto; padding: 0; font-size: 20px; }
        hr { border: 0; height: 1px; background: #4b5563; margin: 20px 0; }
        /* 💡 新增：Toast 加減分提示框與開局大按鈕的樣式 */
        #toast-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(0,0,0,0.85); color: white; padding: 15px 30px; border-radius: 8px; font-size: 20px; font-weight: bold; text-align: center; animation: fadeInOut 2s ease-in-out forwards; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-bottom: 4px solid #fff; }
        .toast.success { border-bottom-color: #4CAF50; }
        .toast.danger { border-bottom-color: #ef4444; color: #fca5a5; }
        .toast.warning { border-bottom-color: #eab308; color: #fef08a; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: scale(0.5); } 15% { opacity: 1; transform: scale(1.1); } 30% { transform: scale(1); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); } }
        
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(14, 17, 23, 0.85); border-radius: 10px; z-index: 10; backdrop-filter: blur(2px); }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>成語接龍🐉</h1>
            <button id="menu-btn" class="btn-dark" style="width: auto; padding: 8px 15px; display: none;">⚙️ 選單</button>
        </div>
        
        <div id="lobby-screen" class="panel">
            <h2 style="margin-top: 0; border-bottom: 1px solid #4b5563; padding-bottom: 10px;">🚪 進入遊戲大廳</h2>
            
            <label>選擇或輸入遊戲室</label>
            <input type="text" id="room-input" placeholder="輸入房間名稱...">
            <div id="room-chips" class="chip-container"></div>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label>你的名字</label>
                    <input type="text" id="player-input" placeholder="輸入名字...">
                    <div id="player-chips" class="chip-container" style="margin-top: 5px;"></div>
                </div>
                <div style="flex: 1;">
                    <label>選擇頭像</label>
                    <select id="avatar-input">
                        <option value="😎">😎</option><option value="🥴">🥴</option><option value="🤩">🤩</option>
                        <option value="🤓">🤓</option><option value="🥸">🥸</option><option value="😇">😇</option>
                        <option value="😉">😉</option><option value="👧">👧</option><option value="👦">👦</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" id="join-btn">🚀 確認進入</button>
        </div>

        <div id="game-screen">
            <div class="panel" style="padding: 15px; margin-bottom: 15px;">
                <div id="turn-info" style="font-weight: bold; color: #4CAF50; margin-bottom: 8px;">🟢 連線中...</div>
                <div id="scoreboard" style="font-size: 13px; color: #ccc;">🏆 排行榜：載入中...</div>
            </div>
            
            <div style="position: relative; margin-bottom: 15px;">
                <div class="chat-box" id="chat-box" style="margin-bottom: 0;"></div>
                <div id="start-overlay" style="display: none;">
                    <button class="btn-primary" id="big-random-btn" style="width: 80%; padding: 25px 15px; font-size: 18px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); background: #10b981; border-radius: 12px; line-height: 1.5;">
                        🎲 請 AI 隨機出題<br>
                        <span style="font-size: 14px; font-weight: normal; color: #d1fae5;">(或直接在下方輸入成語開局)</span>
                    </button>
                </div>
            </div>
            
            <div class="controls">
                <input type="text" id="msg-input" placeholder="輸入成語...">
                <button class="btn-primary" id="send-btn" style="width: 80px;">送出</button>
            </div>
            <div class="controls">
                <button id="sos-btn" style="background: #eab308;">🆘 求生</button>
                <button id="referee-btn" style="background: #3b82f6;">⚖️ 裁判</button>
                <button id="hint-btn" style="background: #8b5cf6;">💡 提示</button>
                </div>
            <button id="surrender-btn" class="btn-dark" style="width: 100%; margin-top: 5px;">🏳️ 我想不出來了 (投降)</button>
            
            <div id="toast-container"></div>
        </div>
    </div>

    <dialog id="menu-dialog">
        <div class="dialog-header">
            <span>⚙️ 遊戲選單與管理</span>
            <button class="close-btn" onclick="document.getElementById('menu-dialog').close()">✖</button>
        </div>
        
        <button class="btn-dark" id="btn-restart" style="margin-bottom: 10px;">🔄 重新開始 (清空計分板)</button>
        <button class="btn-dark" onclick="window.location.reload()" style="margin-bottom: 10px;">🚪 返回大廳</button>
        <button class="btn-dark" onclick="alert('請見 GitHub 上的 README 說明書！')">📖 遊戲規則</button>
        
        <hr>
        <div style="color: #ef4444; font-weight: bold; margin-bottom: 10px;">🚨 管理員危險區域</div>
        <input type="password" id="admin-pwd" placeholder="輸入管理員密碼 (0306)">
        
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="target-user" placeholder="要刪除的玩家名稱" style="margin-bottom: 0;">
            <button class="btn-danger" id="btn-del-user" style="width: 80px;">刪除</button>
        </div>
        <button class="btn-danger" id="btn-clear-room">🧨 毀滅式清空房間</button>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDLbh5GUsAY2vO0MnGDIWysUqdC7KN7BoM", projectId: "solitaire-495623" };
        const API_BASE = "https://solitaire-992925465322.asia-east1.run.app"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoom = "", currentPlayer = "", currentAvatar = "😎";
        let gameState = { lastIdiom: null, currentTurn: null, sosUser: null, sosCount: 0, rejected: false, isGameOver: false, alreadyJudged: false };
        let chatHistory = [];
        let globalRoomData = {};
        let previousScores = null; // 💡 用來追蹤分數變化的全域變數

        // 💡 新增：產生中央加減分提示的函數
        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2000); // 2秒後消失
        }

        // 💡 修改：純粹渲染傳入的名單，不預載手機紀錄
        function renderPlayerChips(roomPlayers = []) {
            const container = document.getElementById('player-chips');
            container.innerHTML = ''; // 清空
            
            if (roomPlayers.length === 0) return; // 沒人就不畫

            roomPlayers.forEach(p => {
                let chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = p;
                chip.onclick = () => {
                    document.getElementById('player-input').value = p;
                    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                };
                container.appendChild(chip);
            });
        }

        function renderRoomChips(rooms) {
            const container = document.getElementById('room-chips');
            container.innerHTML = '';
            rooms.forEach(r => {
                let chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = r;
                chip.onclick = () => {
                    document.getElementById('room-input').value = r;
                    // 💡 重點：點了房間按鈕，才去抓該房間的玩家名單出來顯示
                    renderPlayerChips(globalRoomData[r] || []);
                    
                    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                };
                container.appendChild(chip);
            });
        }

        function listenToGlobalRooms() {
            // renderPlayerChips(); 💡 這一行刪掉，初始不顯示任何名字標籤
            
            const docRef = doc(db, "system_meta", "active_rooms");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    globalRoomData = docSnap.data(); 
                    renderRoomChips(Object.keys(globalRoomData));
                    
                    // 只有當輸入框已經有對應房間時，才即時更新名字標籤
                    const currentInput = document.getElementById('room-input').value;
                    if (currentInput && globalRoomData[currentInput]) {
                        renderPlayerChips(globalRoomData[currentInput]);
                    }
                }
            });
        }
        listenToGlobalRooms();

        document.getElementById('room-input').addEventListener('input', (e) => {
            const selectedRoom = e.target.value;
            // 💡 如果輸入的房間存在，就顯示玩家；否則就清空名字標籤
            if (globalRoomData[selectedRoom]) {
                renderPlayerChips(globalRoomData[selectedRoom]);
            } else {
                renderPlayerChips([]); // 清空名字標籤
            }
            document.querySelectorAll('#room-chips .chip').forEach(c => c.classList.remove('active'));
        });

        function calculateGameState(history) {
            let scores = {}; let playersOrder = [];
            let validIdiom = null, pendingIdiom = null, rejected = false;
            let sosUser = null, sosCount = 0;
            let lastChatUser = null, lastChatPrevSosUser = null, lastChatPrevSosCount = 0;
            let isGameOver = false; let alreadyJudged = false; let roundHints = {}; 

            history.forEach(msg => {
                let mType = msg.type || "chat", user = msg.user_name, text = msg.text;
                if (user && user !== "System" && !user.includes("AI")) {
                    if (!(user in scores)) scores[user] = 50;
                    if (!playersOrder.includes(user)) playersOrder.push(user);
                }

                if (mType === "game_over") isGameOver = true;
                if (mType === "system" && text.includes("重新開始")) {
                    scores = {}; playersOrder = []; validIdiom = null; pendingIdiom = null; rejected = false; isGameOver = false;
                } else if (mType === "system" && text.includes("題目為")) {
                    let match = text.match(/「\*\*([^]+?)\*\*」/);
                    validIdiom = match ? match[1] : text.slice(-4);
                    pendingIdiom = validIdiom; rejected = false; sosUser = null; sosCount = 0; roundHints = {}; 
                } else if (mType === "sos_start") {
                    sosUser = user; sosCount = 0;
                } else if (mType === "chat" && user !== "System" && !user.includes("AI")) {
                    let targetForBonus = rejected ? validIdiom : pendingIdiom;
                    let isPerfectMatch = (targetForBonus && text && targetForBonus.slice(-1) === text[0]);
                    if (!rejected) validIdiom = pendingIdiom;
                    pendingIdiom = text; rejected = false; lastChatUser = user;
                    lastChatPrevSosUser = sosUser; lastChatPrevSosCount = sosCount;
                    alreadyJudged = false; roundHints = {}; 

                    if (sosUser === user) {
                        sosCount++;
                        if (sosCount === 3) { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                    } else { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                } else if (mType === "referee") {
                    if (text.includes("✅") || text.includes("❌")) alreadyJudged = true;
                    if (text.includes("❌")) {
                        rejected = true;
                        if (lastChatUser && scores[lastChatUser]) { scores[lastChatUser] -= 20; if (scores[lastChatUser] <= 0) isGameOver = true; }
                        sosUser = lastChatPrevSosUser; sosCount = lastChatPrevSosCount;
                    }
                    if (text.includes("💡") && msg.requested_by && scores[msg.requested_by]) {
                        scores[msg.requested_by] -= 5;
                        if (scores[msg.requested_by] <= 0) isGameOver = true;
                        roundHints[msg.requested_by] = (roundHints[msg.requested_by] || 0) + 1; 
                    }
                }
            });

            let currentTurn = sosUser || (playersOrder.length > 0 ? (rejected ? lastChatUser : playersOrder[(playersOrder.indexOf(lastChatUser) + 1) % playersOrder.length]) : null);
            return { scores, lastIdiom: rejected ? validIdiom : pendingIdiom, currentTurn, sosUser, sosCount, rejected, isGameOver, alreadyJudged, roundHints, playersOrder };
        }

        function updateUI() {
            const turnInfo = document.getElementById('turn-info'); const msgInput = document.getElementById('msg-input');
            const sendBtn = document.getElementById('send-btn'); const refBtn = document.getElementById('referee-btn');
            const hintBtn = document.getElementById('hint-btn'); const sosBtn = document.getElementById('sos-btn');
            const surBtn = document.getElementById('surrender-btn'); 
            const startOverlay = document.getElementById('start-overlay'); 

            const myInfoPrefix = `<div style="color: #ccc; font-size: 13px; margin-bottom: 5px;">🏠 房間：${currentRoom} | 👤 ${currentAvatar} ${currentPlayer}</div>`;

            if (gameState.isGameOver) {
                turnInfo.innerHTML = `${myInfoPrefix}🏁 遊戲結束！請在選單點擊重新開始。`; turnInfo.style.color = "#ef4444";
                msgInput.disabled = true; msgInput.placeholder = "遊戲已結算";
                sendBtn.disabled = true; refBtn.disabled = true; hintBtn.disabled = true; sosBtn.disabled = true; surBtn.disabled = true;
                startOverlay.style.display = "none";
                return;
            }

            let isMyTurn = false;
            const playerIndex = gameState.playersOrder.indexOf(currentPlayer);
            const hasStarted = chatHistory.some(m => m.type === 'chat' || (m.type === 'system' && m.text.includes("題目為")));

            startOverlay.style.display = (!hasStarted && !gameState.isGameOver) ? "flex" : "none";

            if (!hasStarted) {
                isMyTurn = true;
            } else if (gameState.playersOrder.length === 1) {
                isMyTurn = (playerIndex === -1); 
            } else {
                isMyTurn = (gameState.currentTurn === currentPlayer);
            }

            let hasChat = chatHistory.some(m => m.type === 'chat');
            refBtn.disabled = (gameState.alreadyJudged || !hasChat || gameState.isGameOver);

            // 💡 整理「逃生狀態」字串與次數
            let sosString = "";
            let remainingSos = 0;
            if (gameState.sosUser) {
                remainingSos = 3 - gameState.sosCount;
                sosString = ` <span style="color: #eab308;">(🚨 逃生中：剩 ${remainingSos} 次)</span>`;
            }

            // 💡 行動方與非行動方的狀態列更新邏輯
            if (isMyTurn) {
                if (hasStarted) {
                    turnInfo.innerHTML = `${myInfoPrefix}🟢 輪到你了！接續「${gameState.lastIdiom}」${sosString}`;
                    // ✨ 底下輸入框狀態列 (自己行動時)
                    msgInput.placeholder = gameState.sosUser === currentPlayer 
                        ? `🚨 逃生第 ${gameState.sosCount + 1} 擊！請接「${gameState.lastIdiom}」...`
                        : `🟢 輪到你囉，請接「${gameState.lastIdiom}」...`;
                } else {
                    turnInfo.innerHTML = `${myInfoPrefix}🟢 尚未開局，任何人皆可出題！`;
                    msgInput.placeholder = "你是第一個，請出題開局...";
                }
                turnInfo.style.color = "#4CAF50";
                msgInput.disabled = false; 
                sendBtn.disabled = false; surBtn.disabled = false;
                
                let myHints = gameState.roundHints[currentPlayer] || 0;
                if (myHints === 0) { hintBtn.textContent = "💡 提示 (1/2)"; hintBtn.disabled = (gameState.scores[currentPlayer] <= 5); } 
                else if (myHints === 1) { hintBtn.textContent = "💡 提示 (2/2)"; hintBtn.disabled = (gameState.scores[currentPlayer] <= 5); } 
                else { hintBtn.textContent = "🚫 提示耗盡"; hintBtn.disabled = true; }

                sosBtn.disabled = !!gameState.sosUser;
            } else {
                let currentActor = gameState.currentTurn || '其他人';
                if (hasStarted) {
                    turnInfo.innerHTML = `${myInfoPrefix}⏳ 等待 ${currentActor} 接「${gameState.lastIdiom}」${sosString}`;
                    // ✨ 底下輸入框狀態列 (等待對手行動時)
                    msgInput.placeholder = gameState.sosUser === currentActor
                        ? `🚨 緊盯對手：${currentActor} 逃生中 (剩 ${remainingSos} 次)...`
                        : `⏳ 等待 ${currentActor} 接「${gameState.lastIdiom}」...`;
                } else {
                    turnInfo.innerHTML = `${myInfoPrefix}⏳ 等待開局...`;
                    msgInput.placeholder = "等待任何人出題...";
                }
                
                turnInfo.style.color = "gray";
                msgInput.disabled = true;
                sendBtn.disabled = true; hintBtn.disabled = true; sosBtn.disabled = true; surBtn.disabled = true;
                hintBtn.textContent = "💡 提示";
            }
        }

        async function apiCall(endpoint, bodyData) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bodyData) });
                if (!res.ok) { const err = await res.json(); alert("系統提示：" + err.detail); return false; }
                return true;
            } catch(e) { alert("連線後端失敗！"); return false; }
        }

        document.getElementById('join-btn').addEventListener('click', async () => {
            currentRoom = document.getElementById('room-input').value.trim();
            currentPlayer = document.getElementById('player-input').value.trim();
            currentAvatar = document.getElementById('avatar-input').value;
            if (!currentRoom || !currentPlayer) return alert("⚠️ 請填寫房間名稱與名字！");

            // 💡 新增：檢查名字是否已經在該房間裡 (撞名防護)
            if (globalRoomData[currentRoom] && globalRoomData[currentRoom].includes(currentPlayer)) {
                const confirmMsg = `⚠️ 名字撞了！「${currentPlayer}」已經在這個房間裡了喔！\n\n👉 如果你是「斷線重新連線」，請按【確定】繼續。\n👉 如果你是「新玩家」，請按【取消】並更換一個名字。`;
                if (!confirm(confirmMsg)) {
                    return; // 玩家按下取消，終止進入房間，留在原地改名字
                }
            }

            let savedPlayers = JSON.parse(localStorage.getItem('savedPlayers') || '[]');
            if(!savedPlayers.includes(currentPlayer)) { 
                savedPlayers.push(currentPlayer); localStorage.setItem('savedPlayers', JSON.stringify(savedPlayers)); 
            }

            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('menu-btn').style.display = 'block';

            const q = query(collection(db, "chat_messages"), where("room_name", "==", currentRoom), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = ""; chatHistory = [];

                snapshot.forEach((doc) => {
                    const msg = doc.data(); chatHistory.push(msg);
                    let cssClass = msg.type === "system" ? "system" : (msg.type === "referee" ? "referee" : (msg.type === "join_room" ? "join" : (msg.type === "game_over" ? "game_over" : "")));
                    let prefix = ["chat", "join_room", "sos_start"].includes(msg.type) ? `<strong>${msg.avatar || ''} ${msg.user_name}:</strong> ` : "";
                    chatBox.innerHTML += `<div class="msg ${cssClass}">${prefix}${msg.text}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;

                gameState = calculateGameState(chatHistory);
                
                // 計算分數變化與 Toast 動畫
                if (previousScores !== null) {
                    let oldScore = previousScores[currentPlayer] || 50;
                    let newScore = gameState.scores[currentPlayer] || 50;
                    let diff = newScore - oldScore;
                    if (diff > 0) showToast(`🎉 +${diff} 分`, "success");
                    else if (diff < 0) showToast(`💥 ${diff} 分`, "danger");
                }
                previousScores = { ...gameState.scores };

                let scoreHTML = Object.entries(gameState.scores).sort((a,b)=>b[1]-a[1]).map(e => `<span>${e[0]}: ${e[1]}分</span>`).join(' | ');
                document.getElementById('scoreboard').innerHTML = `🏆 排行榜：${scoreHTML || '尚無資料'}`;
                updateUI();
            });

            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "join_room", text: "加入了房間 👋", avatar: currentAvatar });
        });

        // 💡 監聽 Enter 鍵直接發送
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('send-btn').click(); }
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const text = document.getElementById('msg-input').value.trim();
            if (!text) return;
            
            let isSosFinishing = (gameState.sosUser === currentPlayer && gameState.sosCount === 2);
            let ignoreTone = (gameState.sosUser === currentPlayer && gameState.sosCount === 0);
            
            let success = await apiCall('/send_chat', { room_name: currentRoom, user_name: currentPlayer, text, avatar: currentAvatar, last_idiom: gameState.lastIdiom, ignore_tone: ignoreTone });
            if (success) {
                document.getElementById('msg-input').value = "";
                // 💡 判斷是否為 3 連擊的最後一擊，發送系統恭喜訊息
                if (isSosFinishing) {
                    apiCall('/system_action', { room_name: currentRoom, user_name: "System", action_type: "system", text: `【系統】🎉 恭喜 **${currentPlayer}** 完成 3 連擊逃脫成功！`, avatar: "" });
                }
            }
        });

        document.getElementById('referee-btn').addEventListener('click', () => {
            let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
            if(!lastChat) return alert("還沒有人發言！");
            apiCall('/call_referee', { room_name: currentRoom, user_name: currentPlayer, action_type: "call", text: "呼叫裁判", avatar: currentAvatar, target_text: lastChat.text });
        });

        document.getElementById('hint-btn').addEventListener('click', () => {
            if(!gameState.lastIdiom) return alert("還沒有題目！");
            let myHints = gameState.roundHints[currentPlayer] || 0;
            let actionType = myHints === 0 ? "hint_1" : "hint_2"; 
            apiCall('/buy_hint', { room_name: currentRoom, user_name: currentPlayer, action_type: actionType, text: "買提示", avatar: currentAvatar, target_text: gameState.lastIdiom });
        });

        document.getElementById('sos-btn').addEventListener('click', () => {
            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "sos_start", text: "發動了「換聲調求生」！", avatar: currentAvatar });
        });

        // 💡 綁定中間新版大按鈕的事件
        document.getElementById('big-random-btn').addEventListener('click', () => {
            apiCall('/random_topic', { room_name: currentRoom, user_name: currentPlayer, action_type: "random", text: "請求出題", avatar: currentAvatar });
        });
        
        document.getElementById('surrender-btn').addEventListener('click', () => {
            if(confirm("確定要投降並結束這場遊戲嗎？")) {
                apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "game_over", text: "🏳️ 舉白旗投降了！遊戲結束！", avatar: currentAvatar });
            }
        });

        const menuDialog = document.getElementById('menu-dialog');
        document.getElementById('menu-btn').addEventListener('click', () => menuDialog.showModal());

        document.getElementById('btn-restart').addEventListener('click', () => {
            if(confirm("確定要清空房間所有對話並重新開始嗎？\n(大廳的玩家角色會保留)")) {
                apiCall('/restart_game', { room_name: currentRoom, user_name: "System", action_type: "restart", text: "", avatar: "" });
                menuDialog.close();
            }
        });

        document.getElementById('btn-del-user').addEventListener('click', async () => {
            const targetUser = document.getElementById('target-user').value.trim();
            const pwd = document.getElementById('admin-pwd').value;
            if(!targetUser || !pwd) return alert("請輸入密碼與玩家名稱！");
            if(confirm(`確定刪除 ${targetUser} 的紀錄？`)) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "delete_user", target_user: targetUser });
                if(success) { alert("刪除成功！"); menuDialog.close(); }
            }
        });

        document.getElementById('btn-clear-room').addEventListener('click', async () => {
            const pwd = document.getElementById('admin-pwd').value;
            if(!pwd) return alert("請輸入密碼！");
            if(confirm("🧨 確定要徹底毀滅此房間？資料與角色紀錄將全部消失！")) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "clear_room" });
                if(success) { alert("房間已徹底毀滅！"); window.location.reload(); }
            }
        });
    </script>
</body>
</html>
