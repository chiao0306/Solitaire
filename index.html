<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語接龍 - 真即時版</title>
    <style>
        body { font-family: sans-serif; background-color: #0e1117; color: #fafafa; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;}
        .container { width: 100%; max-width: 600px; }
        .chat-box { background: #262730; border-radius: 10px; padding: 15px; height: 350px; overflow-y: auto; margin-bottom: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #31333f; font-size: 15px;}
        .msg.system { background: #1e3a8a; color: #93c5fd; }
        .msg.referee { background: #3f6212; color: #d9f99d; }
        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #4b5563; background: #0e1117; color: white;}
        button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-send { background: #ff4b4b; min-width: 70px; }
        .btn-sos { background: #eab308; flex: 1; }
        .btn-ref { background: #3b82f6; flex: 1; }
        .btn-hint { background: #8b5cf6; flex: 1; }
        .status-panel { background: #262730; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">成語接龍🐉</h2>
        
        <div class="status-panel">
            <div id="turn-info" style="font-weight: bold; color: #4CAF50; margin-bottom: 8px;">🟢 系統載入中...</div>
            <div id="scoreboard" style="font-size: 13px; color: #ccc;">🏆 排行榜：載入中</div>
        </div>

        <div class="chat-box" id="chat-box"></div>

        <div class="controls">
            <input type="text" id="msg-input" placeholder="輸入成語...">
            <button class="btn-send" id="send-btn">送出</button>
        </div>
        <div class="controls">
            <button class="btn-sos" id="sos-btn">🆘 求生</button>
            <button class="btn-ref" id="referee-btn">⚖️ 裁判</button>
            <button class="btn-hint" id="hint-btn">💡 提示</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } 
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ 【要修改這裡 1】：填入你的 Firebase 網頁設定
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            projectId: "你的專案ID",
        };

        // ==========================================
        // ⚠️ 【要修改這裡 2】：填入你部署完 Cloud Run 後拿到的網址
        // ==========================================
        const API_BASE = "https://你的-cloud-run-網址.a.run.app"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const currentRoom = "大廳";
        const currentPlayer = "玩家1"; // 測試用寫死
        const avatar = "😎";

        let gameState = { lastIdiom: null, currentTurn: null, sosUser: null, sosCount: 0, rejected: false };
        let chatHistory = [];

        // 狀態引擎 (翻譯自 Python)
        function calculateGameState(history) {
            let scores = {}; let playersOrder = [];
            let validIdiom = null, pendingIdiom = null, rejected = false;
            let sosUser = null, sosCount = 0;
            let lastChatUser = null, lastChatPrevSosUser = null, lastChatPrevSosCount = 0;

            history.forEach(msg => {
                let mType = msg.type || "chat", user = msg.user_name, text = msg.text;
                if (user && user !== "System" && !user.includes("AI")) {
                    if (!(user in scores)) scores[user] = 50;
                    if (!playersOrder.includes(user)) playersOrder.push(user);
                }

                if (mType === "system" && text.includes("題目為")) {
                    let match = text.match(/「\*\*([^]+?)\*\*」/);
                    validIdiom = match ? match[1] : text.slice(-4);
                    pendingIdiom = validIdiom; rejected = false; sosUser = null; sosCount = 0;
                } else if (mType === "sos_start") {
                    sosUser = user; sosCount = 0;
                } else if (mType === "chat" && user !== "System" && !user.includes("AI")) {
                    let targetForBonus = rejected ? validIdiom : pendingIdiom;
                    let isPerfectMatch = (targetForBonus && text && targetForBonus.slice(-1) === text[0]);
                    if (!rejected) validIdiom = pendingIdiom;
                    pendingIdiom = text; rejected = false; lastChatUser = user;
                    lastChatPrevSosUser = sosUser; lastChatPrevSosCount = sosCount;

                    if (sosUser === user) {
                        sosCount++;
                        if (sosCount === 3) { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                    } else { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                } else if (mType === "referee") {
                    if (text.includes("❌")) {
                        rejected = true;
                        if (lastChatUser && scores[lastChatUser]) scores[lastChatUser] -= 20;
                        sosUser = lastChatPrevSosUser; sosCount = lastChatPrevSosCount;
                    }
                    if (text.includes("💡") && msg.requested_by && scores[msg.requested_by]) {
                        scores[msg.requested_by] -= 5;
                    }
                }
            });

            let currentTurn = sosUser || (playersOrder.length > 0 ? (rejected ? lastChatUser : playersOrder[(playersOrder.indexOf(lastChatUser) + 1) % playersOrder.length]) : null);
            return { scores, lastIdiom: rejected ? validIdiom : pendingIdiom, currentTurn, sosUser, sosCount, rejected };
        }

        // Firebase 零延遲監聽
        const q = query(collection(db, "chat_messages"), where("room_name", "==", currentRoom), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ""; chatHistory = [];

            snapshot.forEach((doc) => {
                const msg = doc.data(); chatHistory.push(msg);
                let cssClass = msg.type === "system" ? "system" : (msg.type === "referee" ? "referee" : "");
                chatBox.innerHTML += `<div class="msg ${cssClass}"><strong>${msg.avatar || ''} ${msg.user_name}:</strong> ${msg.text}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;

            gameState = calculateGameState(chatHistory);
            
            let scoreHTML = Object.entries(gameState.scores).sort((a,b)=>b[1]-a[1]).map(e => `<span>${e[0]}: ${e[1]}分</span>`).join(' | ');
            document.getElementById('scoreboard').innerHTML = `🏆 排行榜：${scoreHTML || '尚無資料'}`;
            
            const turnInfo = document.getElementById('turn-info');
            if(gameState.currentTurn === currentPlayer || !gameState.currentTurn) {
                turnInfo.innerHTML = `🟢 輪到你了！請接續「${gameState.lastIdiom || '等待出題'}」`;
                turnInfo.style.color = "#4CAF50";
            } else {
                turnInfo.innerHTML = `⏳ 等待 ${gameState.currentTurn} 發言...`;
                turnInfo.style.color = "gray";
            }
        });

        // 按鈕 API 呼叫 (整合防呆與報錯)
        async function apiCall(endpoint, bodyData) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });
                if (!res.ok) {
                    const err = await res.json(); alert("錯誤：" + err.detail); return false;
                }
                return true;
            } catch(e) { alert("連線後端失敗！請確認 Cloud Run 網址正確。"); return false; }
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const text = document.getElementById('msg-input').value;
            if (!text) return;
            let ignoreTone = (gameState.sosUser === currentPlayer && gameState.sosCount === 0);
            
            let success = await apiCall('/send_chat', { room_name: currentRoom, user_name: currentPlayer, text, avatar, last_idiom: gameState.lastIdiom, ignore_tone: ignoreTone });
            if(success) document.getElementById('msg-input').value = "";
        });

        document.getElementById('referee-btn').addEventListener('click', () => {
            let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
            if(!lastChat) return alert("還沒有人發言！");
            apiCall('/call_referee', { room_name: currentRoom, user_name: currentPlayer, action_type: "call", text: "呼叫裁判", avatar, target_text: lastChat.text });
        });

        document.getElementById('hint-btn').addEventListener('click', () => {
            if(!gameState.lastIdiom) return alert("還沒有題目！");
            apiCall('/buy_hint', { room_name: currentRoom, user_name: currentPlayer, action_type: "hint", text: "買提示", avatar, target_text: gameState.lastIdiom });
        });
        
        document.getElementById('sos-btn').addEventListener('click', () => {
            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "sos_start", text: "發動了「換聲調求生」！", avatar });
        });
    </script>
</body>
</html>
