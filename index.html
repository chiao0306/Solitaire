<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語接龍🐉</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1117; color: #fafafa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        .container { width: 100%; max-width: 600px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #fff; }
        
        .panel { background: #262730; border-radius: 12px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #ccc; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #4b5563; background: #0e1117; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #ff4b4b; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: #ff4b4b; } .btn-primary:hover { background: #ff3333; }
        .btn-dark { background: #31333f; border: 1px solid #4b5563; }
        .btn-danger { background: #dc2626; }
        
        #game-screen { display: none; }
        .chat-box { background: #1a1c23; border-radius: 10px; padding: 15px; height: 380px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #31333f; }
        .msg { margin-bottom: 12px; padding: 12px; border-radius: 10px; background: #31333f; font-size: 15px; line-height: 1.4; }
        .msg.system { background: rgba(30, 58, 138, 0.4); border-left: 4px solid #3b82f6; color: #93c5fd; }
        .msg.referee { background: rgba(63, 98, 18, 0.4); border-left: 4px solid #84cc16; color: #d9f99d; }
        .msg.join { background: transparent; color: #888; font-size: 13px; text-align: center; padding: 5px; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .controls input { margin-bottom: 0; }
        
        /* 原生對話框樣式 (Modal) */
        dialog { background: #262730; color: white; border: 1px solid #4b5563; border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        .dialog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .close-btn { background: transparent; color: #ccc; width: auto; padding: 0; font-size: 20px; }
        hr { border: 0; height: 1px; background: #4b5563; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>成語接龍🐉</h1>
            <button id="menu-btn" class="btn-dark" style="width: auto; padding: 8px 15px; display: none;">⚙️ 選單</button>
        </div>
        
        <div id="lobby-screen" class="panel">
            <h2 style="margin-top: 0; border-bottom: 1px solid #4b5563; padding-bottom: 10px;">🚪 進入遊戲大廳</h2>
            
            <label>快速進入房間 (點擊查看歷史)</label>
            <input type="text" id="room-input" list="room-list" placeholder="輸入或選擇房間名稱...">
            <datalist id="room-list"></datalist>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label>你的名字</label>
                    <input type="text" id="player-input" list="player-list" placeholder="輸入名字...">
                    <datalist id="player-list"></datalist>
                </div>
                <div style="flex: 1;">
                    <label>選擇頭像</label>
                    <select id="avatar-input">
                        <option value="😎">😎</option><option value="🥴">🥴</option><option value="🤩">🤩</option>
                        <option value="🤓">🤓</option><option value="🥸">🥸</option><option value="😇">😇</option>
                        <option value="😉">😉</option><option value="👧">👧</option><option value="👦">👦</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" id="join-btn">🚀 確認進入</button>
        </div>

        <div id="game-screen">
            <div class="panel" style="padding: 15px; margin-bottom: 15px;">
                <div id="turn-info" style="font-weight: bold; color: #4CAF50; margin-bottom: 8px;">🟢 連線中...</div>
                <div id="scoreboard" style="font-size: 13px; color: #ccc;">🏆 排行榜：載入中...</div>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="controls">
                <input type="text" id="msg-input" placeholder="輸入成語...">
                <button class="btn-primary" id="send-btn" style="width: 80px;">送出</button>
            </div>
            <div class="controls">
                <button id="sos-btn" style="background: #eab308;">🆘 求生</button>
                <button id="referee-btn" style="background: #3b82f6;">⚖️ 裁判</button>
                <button id="hint-btn" style="background: #8b5cf6;">💡 提示</button>
            </div>
        </div>
    </div>

    <dialog id="menu-dialog">
        <div class="dialog-header">
            <span>⚙️ 遊戲選單與管理</span>
            <button class="close-btn" onclick="document.getElementById('menu-dialog').close()">✖</button>
        </div>
        
        <button class="btn-dark" id="btn-restart" style="margin-bottom: 10px;">🔄 重新開始 (清空計分板)</button>
        <button class="btn-dark" onclick="window.location.reload()" style="margin-bottom: 10px;">🚪 返回大廳</button>
        <button class="btn-dark" onclick="alert('請見 GitHub 上的 README 說明書！')">📖 遊戲規則</button>
        
        <hr>
        <div style="color: #ef4444; font-weight: bold; margin-bottom: 10px;">🚨 管理員危險區域</div>
        <input type="password" id="admin-pwd" placeholder="輸入管理員密碼 (0306)">
        
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="target-user" placeholder="要刪除的玩家名稱" style="margin-bottom: 0;">
            <button class="btn-danger" id="btn-del-user" style="width: 80px;">刪除</button>
        </div>
        <button class="btn-danger" id="btn-clear-room">🧨 毀滅式清空房間</button>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ 填入你的 Config
        const firebaseConfig = { apiKey: "AIzaSyDLbh5GUsAY2vO0MnGDIWysUqdC7KN7BoM", projectId: "solitaire-495623" };
        const API_BASE = "https://solitaire-992925465322.asia-east1.run.app"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoom = "", currentPlayer = "", currentAvatar = "😎";
        let gameState = { lastIdiom: null, currentTurn: null, sosUser: null, sosCount: 0, rejected: false };
        let chatHistory = [];
        
        // 💡 存放從後端抓回來的「簽到表」
        let globalRoomData = {};

        // --- 現代化大廳邏輯 ---
        async function loadRoomsFromBackend() {
            try {
                const res = await fetch(`${API_BASE}/get_rooms`);
                if (res.ok) {
                    const result = await res.json();
                    globalRoomData = result.data; // 例如：{"測試大廳": ["玩家A", "玩家B"]}
                    
                    // 把房間名稱填入下拉選單
                    const roomList = document.getElementById('room-list');
                    roomList.innerHTML = Object.keys(globalRoomData).map(r => `<option value="${r}">`).join('');
                }
            } catch(e) {
                console.log("無法取得房間列表，可能後端仍在部署中");
            }
        }

        // 網頁一開就去抓簽到表 (只消耗 1 次讀取)
        loadRoomsFromBackend();

        // 💡 連動魔法：監聽房間輸入框的變化
        document.getElementById('room-input').addEventListener('input', (e) => {
            const selectedRoom = e.target.value;
            const playerList = document.getElementById('player-list');
            
            // 如果輸入的房間存在於簽到表中，就把那個房間的玩家名單填入
            if (globalRoomData[selectedRoom]) {
                const players = globalRoomData[selectedRoom];
                playerList.innerHTML = players.map(p => `<option value="${p}">`).join('');
            } else {
                // 如果是新房間，名字選單清空
                playerList.innerHTML = "";
            }
        });

        // --- 狀態引擎 ---
        function calculateGameState(history) {
            let scores = {}; let playersOrder = [];
            let validIdiom = null, pendingIdiom = null, rejected = false;
            let sosUser = null, sosCount = 0;
            let lastChatUser = null, lastChatPrevSosUser = null, lastChatPrevSosCount = 0;

            history.forEach(msg => {
                let mType = msg.type || "chat", user = msg.user_name, text = msg.text;
                if (user && user !== "System" && !user.includes("AI")) {
                    if (!(user in scores)) scores[user] = 50;
                    if (!playersOrder.includes(user)) playersOrder.push(user);
                }

                if (mType === "system" && text.includes("重新開始")) {
                    scores = {}; playersOrder = []; validIdiom = null; pendingIdiom = null; rejected = false;
                } else if (mType === "system" && text.includes("題目為")) {
                    let match = text.match(/「\*\*([^]+?)\*\*」/);
                    validIdiom = match ? match[1] : text.slice(-4);
                    pendingIdiom = validIdiom; rejected = false; sosUser = null; sosCount = 0;
                } else if (mType === "sos_start") {
                    sosUser = user; sosCount = 0;
                } else if (mType === "chat" && user !== "System" && !user.includes("AI")) {
                    let targetForBonus = rejected ? validIdiom : pendingIdiom;
                    let isPerfectMatch = (targetForBonus && text && targetForBonus.slice(-1) === text[0]);
                    if (!rejected) validIdiom = pendingIdiom;
                    pendingIdiom = text; rejected = false; lastChatUser = user;
                    lastChatPrevSosUser = sosUser; lastChatPrevSosCount = sosCount;

                    if (sosUser === user) {
                        sosCount++;
                        if (sosCount === 3) { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                    } else { scores[user] += isPerfectMatch ? 20 : 10; sosUser = null; sosCount = 0; }
                } else if (mType === "referee") {
                    if (text.includes("❌")) {
                        rejected = true;
                        if (lastChatUser && scores[lastChatUser]) scores[lastChatUser] -= 20;
                        sosUser = lastChatPrevSosUser; sosCount = lastChatPrevSosCount;
                    }
                    if (text.includes("💡") && msg.requested_by && scores[msg.requested_by]) scores[msg.requested_by] -= 5;
                }
            });

            let currentTurn = sosUser || (playersOrder.length > 0 ? (rejected ? lastChatUser : playersOrder[(playersOrder.indexOf(lastChatUser) + 1) % playersOrder.length]) : null);
            return { scores, lastIdiom: rejected ? validIdiom : pendingIdiom, currentTurn, sosUser, sosCount, rejected };
        }

        async function apiCall(endpoint, bodyData) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bodyData) });
                if (!res.ok) { const err = await res.json(); alert("系統提示：" + err.detail); return false; }
                return true;
            } catch(e) { alert("連線後端失敗！"); return false; }
        }

        document.getElementById('join-btn').addEventListener('click', async () => {
            currentRoom = document.getElementById('room-input').value.trim();
            currentPlayer = document.getElementById('player-input').value.trim();
            currentAvatar = document.getElementById('avatar-input').value;
            if (!currentRoom || !currentPlayer) return alert("⚠️ 請填寫房間名稱與名字！");

            // 💡 修正：直接在這裡把名字記在手機裡，方便下次不用重打
            let savedPlayers = JSON.parse(localStorage.getItem('savedPlayers') || '[]');
            if(!savedPlayers.includes(currentPlayer)) { 
                savedPlayers.push(currentPlayer); 
                localStorage.setItem('savedPlayers', JSON.stringify(savedPlayers)); 
            }

            // 隱藏大廳，顯示遊戲室
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('menu-btn').style.display = 'block';

            const q = query(collection(db, "chat_messages"), where("room_name", "==", currentRoom), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = ""; chatHistory = [];

                snapshot.forEach((doc) => {
                    const msg = doc.data(); chatHistory.push(msg);
                    let cssClass = msg.type === "system" ? "system" : (msg.type === "referee" ? "referee" : (msg.type === "join_room" ? "join" : ""));
                    let prefix = ["chat", "join_room", "sos_start"].includes(msg.type) ? `<strong>${msg.avatar || ''} ${msg.user_name}:</strong> ` : "";
                    chatBox.innerHTML += `<div class="msg ${cssClass}">${prefix}${msg.text}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;

                gameState = calculateGameState(chatHistory);
                let scoreHTML = Object.entries(gameState.scores).sort((a,b)=>b[1]-a[1]).map(e => `<span>${e[0]}: ${e[1]}分</span>`).join(' | ');
                document.getElementById('scoreboard').innerHTML = `🏆 排行榜：${scoreHTML || '尚無資料'}`;
                
                const turnInfo = document.getElementById('turn-info');
                if(gameState.currentTurn === currentPlayer || !gameState.currentTurn) {
                    turnInfo.innerHTML = `🟢 輪到你了！請接續「${gameState.lastIdiom || '等待出題'}」`;
                    turnInfo.style.color = "#4CAF50";
                } else {
                    turnInfo.innerHTML = `⏳ 等待 ${gameState.currentTurn} 發言...`; turnInfo.style.color = "gray";
                }
            });

            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "join_room", text: "加入了房間 👋", avatar: currentAvatar });
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const text = document.getElementById('msg-input').value.trim();
            if (!text) return;
            let ignoreTone = (gameState.sosUser === currentPlayer && gameState.sosCount === 0);
            let success = await apiCall('/send_chat', { room_name: currentRoom, user_name: currentPlayer, text, avatar: currentAvatar, last_idiom: gameState.lastIdiom, ignore_tone: ignoreTone });
            if(success) document.getElementById('msg-input').value = "";
        });

        document.getElementById('referee-btn').addEventListener('click', () => {
            let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
            if(!lastChat) return alert("還沒有人發言！");
            apiCall('/call_referee', { room_name: currentRoom, user_name: currentPlayer, action_type: "call", text: "呼叫", avatar: currentAvatar, target_text: lastChat.text });
        });
        document.getElementById('hint-btn').addEventListener('click', () => {
            if(!gameState.lastIdiom) return alert("還沒有題目！");
            apiCall('/buy_hint', { room_name: currentRoom, user_name: currentPlayer, action_type: "hint", text: "提示", avatar: currentAvatar, target_text: gameState.lastIdiom });
        });
        document.getElementById('sos-btn').addEventListener('click', () => {
            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "sos_start", text: "發動了「換聲調求生」！", avatar: currentAvatar });
        });

        // --- ⚙️ 選單與管理功能 ---
        const menuDialog = document.getElementById('menu-dialog');
        document.getElementById('menu-btn').addEventListener('click', () => menuDialog.showModal());

        document.getElementById('btn-restart').addEventListener('click', () => {
            if(confirm("確定要重新開始並清空計分板嗎？")) {
                apiCall('/system_action', { room_name: currentRoom, user_name: "System", action_type: "system", text: "【系統】重新開始遊戲！請重新出題。", avatar: "" });
                menuDialog.close();
            }
        });

        document.getElementById('btn-del-user').addEventListener('click', async () => {
            const targetUser = document.getElementById('target-user').value.trim();
            const pwd = document.getElementById('admin-pwd').value;
            if(!targetUser || !pwd) return alert("請輸入密碼與玩家名稱！");
            if(confirm(`確定刪除 ${targetUser} 的紀錄？`)) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "delete_user", target_user: targetUser });
                if(success) { alert("刪除成功！"); menuDialog.close(); }
            }
        });

        document.getElementById('btn-clear-room').addEventListener('click', async () => {
            const pwd = document.getElementById('admin-pwd').value;
            if(!pwd) return alert("請輸入密碼！");
            if(confirm("🧨 確定要徹底清空房間所有資料？無法復原！")) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "clear_room" });
                if(success) { alert("房間已清空！"); menuDialog.close(); }
            }
        });
    </script>
</body>
</html>
