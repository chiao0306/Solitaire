<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語接龍🐉</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1117; color: #fafafa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        .container { width: 100%; max-width: 600px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #fff; }
        
        .panel { background: #262730; border-radius: 12px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #ccc; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #4b5563; background: #0e1117; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #ff4b4b; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #374151 !important; color: #9ca3af !important; cursor: not-allowed; border: none; }
        
        .btn-primary { background: #ff4b4b; } .btn-primary:hover { background: #ff3333; }
        .btn-dark { background: #31333f; border: 1px solid #4b5563; }
        .btn-danger { background: #dc2626; }
        
        #game-screen { display: none; }
        .chat-box { background: #1a1c23; border-radius: 10px; padding: 15px; height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; border: 1px solid #31333f; }
        
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg-wrapper.self { align-items: flex-end; }   
        .msg-wrapper.other { align-items: flex-start; } 
        .msg-wrapper.system { align-items: center; }    

        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; }
        
        .msg-info { font-size: 14.5px; margin-bottom: 4px; color: #aaa; font-weight: 500; }
        .msg.topic-prompt { background: #1e40af !important; color: #fff !important; font-weight: bold; align-self: center; border: none; font-size: 15px; box-shadow: 0 0 10px rgba(30, 64, 175, 0.5); }
        .msg.self, .msg.other { font-size: 18px; padding: 12px 18px; }
        .msg.self { background: #056162; color: white; border-bottom-right-radius: 2px; }
        .msg.other { background: #31333f; color: white; border-bottom-left-radius: 2px; }
        
        .msg.system, .msg.join, .msg.game_over { background: transparent; color: #888; font-size: 13px; text-align: center; border: none; max-width: 100%; }
        .msg.referee { background: rgba(63, 98, 18, 0.4); border-left: 4px solid #84cc16; color: #d9f99d; align-self: center; text-align: center; font-size: 15px; }
        
        .msg.sos_start { background: #eab308 !important; color: #000 !important; font-weight: bold; align-self: center; border: none; font-size: 15px; }
        .msg.combo-success { background: #10b981 !important; color: #fff !important; font-weight: bold; align-self: center; border: none; font-size: 15px; }
        .msg.retry-prompt { background: #ef4444 !important; color: #fff !important; font-weight: bold; align-self: center; border: none; font-size: 15px; margin-top: -5px; }

        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .controls input { margin-bottom: 0; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: -10px; margin-bottom: 20px; }
        .chip { background: #31333f; border: 1px solid #4b5563; padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; transition: 0.2s; color: #ccc; user-select: none; }
        .chip:hover { background: #4b5563; color: white; }
        .chip.active { background: #ff4b4b; border-color: #ff4b4b; color: white; }

        dialog { background: #262730; color: white; border: 1px solid #4b5563; border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        .dialog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .close-btn { background: transparent; color: #ccc; width: auto; padding: 0; font-size: 20px; }
        hr { border: 0; height: 1px; background: #4b5563; margin: 20px 0; }

        #toast-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(0,0,0,0.85); color: white; padding: 15px 30px; border-radius: 8px; font-size: 20px; font-weight: bold; text-align: center; animation: fadeInOut 2s ease-in-out forwards; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-bottom: 4px solid #fff; }
        .toast.success { border-bottom-color: #4CAF50; }
        .toast.danger { border-bottom-color: #ef4444; color: #fca5a5; }
        .toast.warning { border-bottom-color: #eab308; color: #fef08a; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: scale(0.5); } 15% { opacity: 1; transform: scale(1.1); } 30% { transform: scale(1); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); } }
        
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(14, 17, 23, 0.85); border-radius: 10px; z-index: 10; backdrop-filter: blur(2px); }

        #idiom-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .idiom-char { font-size: 110px; color: #FFD700; font-weight: bold; text-shadow: 0 0 20px #ea580c, 0 0 40px #facc15; opacity: 0; }
        @keyframes charJump { 0% { opacity: 0; transform: scale(4); filter: blur(10px); } 15% { opacity: 1; transform: scale(1); filter: blur(0); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
        .animate-char { animation: charJump 2.5s ease-out forwards; }

        #custom-alert-dialog { background: #1e293b; color: white; border: 1px solid #4b5563; border-radius: 16px; padding: 25px; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); text-align: center; }
        #custom-alert-dialog::backdrop { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(3px); }
        #custom-alert-msg { margin-bottom: 25px; font-size: 16px; line-height: 1.5; white-space: pre-wrap; color: #f8fafc; font-weight: bold; }
        .alert-btn-group { display: flex; gap: 10px; justify-content: center; }
        .msg.self:hover { cursor: pointer; filter: brightness(1.15); transition: 0.2s; }

        /* ✨ 回合制設定區域的設計 */
        .turn-settings-box { background: #31333f; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #4b5563; }
        .turn-settings-row { display: flex; align-items: center; gap: 10px; }
        .turn-settings-box input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; accent-color: #ff4b4b; }
        .turn-settings-box label { margin: 0; font-size: 15px; cursor: pointer; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>成語接龍🐉</h1>
            <button id="menu-btn" class="btn-dark" style="width: auto; padding: 8px 15px; display: none;">⚙️ 選單</button>
        </div>
        
        <div id="lobby-screen" class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4b5563; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0; border: none; padding: 0;">🚪 進入遊戲大廳</h2>
                <a href="./README.md" target="_blank" style="background: #3b82f6; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.2s;">📖 遊戲規則</a>
            </div>
            
            <label>選擇或輸入遊戲室</label>
            <input type="text" id="room-input" placeholder="輸入房間名稱...">
            <div id="room-chips" class="chip-container"></div>
            
            <div class="turn-settings-box">
                <div id="lobby-setup-row" class="turn-settings-row">
                    <input type="checkbox" id="lobby-turn-cb">
                    <label for="lobby-turn-cb">🏁 開啟回合制比賽</label>
                    <select id="lobby-rounds-sel" style="width: auto; padding: 6px; margin: 0; display: none; font-size: 14px; flex: 1;">
                        <option value="5">5 回合</option><option value="10">10 回合</option>
                        <option value="15">15 回合</option><option value="20">20 回合</option>
                        <option value="25">25 回合</option><option value="30">30 回合</option>
                    </select>
                </div>
                <div id="lobby-turn-status" style="font-size: 15px; font-weight: bold; color: #fbbf24; display: none;"></div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label>你的名字</label>
                    <input type="text" id="player-input" placeholder="輸入名字...">
                    <div id="player-chips" class="chip-container" style="margin-top: 5px;"></div>
                </div>
                <div style="flex: 1;">
                    <label>選擇頭像</label>
                    <select id="avatar-input">
                        <option value="😎">😎</option><option value="🥴">🥴</option><option value="🤩">🤩</option>
                        <option value="🤓">🤓</option><option value="🥸">🥸</option><option value="😇">😇</option>
                        <option value="😉">😉</option><option value="👧">👧</option><option value="👦">👦</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" id="join-btn">🚀 確認進入</button>
        </div>

        <div id="game-screen">
        <div id="idiom-overlay"></div>
            <div class="panel" style="padding: 15px; margin-bottom: 15px;">
                <div id="turn-info" style="font-weight: bold; color: #4CAF50; margin-bottom: 8px;">🟢 連線中...</div>
                <div id="scoreboard" style="font-size: 13px; color: #ccc;">🏆 排行榜：載入中...</div>
            </div>
            
            <div style="position: relative; margin-bottom: 15px;">
                <div class="chat-box" id="chat-box" style="margin-bottom: 0;"></div>
                <div id="start-overlay" style="display: none;">
                    <button class="btn-primary" id="big-random-btn" style="width: 80%; padding: 25px 15px; font-size: 18px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); background: #10b981; border-radius: 12px; line-height: 1.5;">
                        🎲 請 AI 隨機出題<br>
                        <span style="font-size: 14px; font-weight: normal; color: #d1fae5;">(或直接在下方輸入成語開局)</span>
                    </button>
                </div>
            </div>
            
            <div class="controls">
                <input type="text" id="msg-input" placeholder="輸入成語...">
                <button class="btn-primary" id="send-btn" style="width: 80px;">送出</button>
            </div>
            <div class="controls">
                <button id="sos-btn" style="background: #eab308;">🆘 求生</button>
                <button id="referee-btn" style="background: #3b82f6;">⚖️ 裁判</button>
                <button id="hint-btn" style="background: #8b5cf6;">💡 提示</button>
            </div>
            <button id="surrender-btn" class="btn-dark" style="width: 100%; margin-top: 5px;">🏳️ 我想不出來了 (投降)</button>
            
            <div id="toast-container"></div>
        </div>
    </div>

    <dialog id="menu-dialog">
        <div class="dialog-header">
            <span>⚙️ 遊戲選單與管理</span>
            <button class="close-btn" onclick="document.getElementById('menu-dialog').close()">✖</button>
        </div>
        
        <div class="turn-settings-box" style="margin-bottom: 10px; background: #1e293b;">
            <div class="turn-settings-row">
                <input type="checkbox" id="restart-turn-cb">
                <label for="restart-turn-cb">🏁 回合制</label>
                <select id="restart-rounds-sel" style="width: auto; padding: 6px; margin: 0; display: none; font-size: 14px; flex: 1;">
                    <option value="5">5 回合</option><option value="10">10 回合</option>
                    <option value="15">15 回合</option><option value="20">20 回合</option>
                    <option value="25">25 回合</option><option value="30">30 回合</option>
                </select>
            </div>
        </div>

        <button class="btn-dark" id="btn-restart" style="margin-bottom: 10px;">🔄 重新開始 (套用上方設定)</button>
        <button class="btn-dark" onclick="window.location.reload()" style="margin-bottom: 10px;">🚪 返回大廳</button>
        <button class="btn-danger" id="btn-leave-room" style="margin-bottom: 10px; margin-top: 5px;">🏃 刪除角色並退出房間</button>
        <button class="btn-dark" onclick="window.open('./README.md', '_blank')" style="margin-bottom: 10px;">📖 遊戲規則</button>
 
        <hr>
        <div style="color: #ef4444; font-weight: bold; margin-bottom: 10px;">🚨 管理員危險區域</div>
        <input type="password" id="admin-pwd" placeholder="輸入管理員密碼 (0306)">
        
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="target-user" placeholder="要刪除的玩家名稱" style="margin-bottom: 0;">
            <button class="btn-danger" id="btn-del-user" style="width: 80px;">刪除</button>
        </div>
        <button class="btn-danger" id="btn-clear-room">🧨 毀滅式清空房間</button>
    </dialog>
    
    <dialog id="custom-alert-dialog">
        <div id="custom-alert-msg"></div>
        <div class="alert-btn-group">
            <button id="alert-cancel-btn" class="btn-dark" style="display: none; flex: 1;">取消</button>
            <button id="alert-ok-btn" class="btn-primary" style="flex: 1;">確定</button>
        </div>
    </dialog>
    
    <dialog id="final-verify-dialog" style="text-align: center;">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #fbbf24;">🏁 最終回合結束審查</div>
        <div id="final-verify-text" style="margin-bottom: 20px; line-height: 1.6;">
            正在準備結算資訊...
        </div>
        <div class="alert-btn-group">
            <button id="final-referee-btn" class="btn-primary" style="flex: 1; background: #3b82f6;">⚖️ 申請裁判</button>
            <button id="final-no-btn" class="btn-dark" style="flex: 1;">❌ 不用，直接結算</button>
        </div>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDLbh5GUsAY2vO0MnGDIWysUqdC7KN7BoM", projectId: "solitaire-495623" };
        const API_BASE = "https://solitaire-992925465322.asia-east1.run.app"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoom = "", currentPlayer = "", currentAvatar = "😎";
        let gameState = { scores: {}, playersOrder: [], currentTurn: null, lastIdiom: null, pendingIdiom: null, rejected: false, sosUser: null, sosCount: 0, isGameOver: false, alreadyJudged: false, roundHints: {}, maxRounds: 0, currentRound: 0 };
        let chatHistory = [];
        let globalRoomData = {};
        let previousScores = null; 
        let previousPendingIdiom = null; 
        
        // ✨ 新增：防止 XSS 攻擊的字元跳脫函式
        function escapeHTML(str) {
            if (!str) return "";
            return str.toString().replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            );
        }

        function showModalAlert(msg, showCancel = false) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('custom-alert-dialog');
                document.getElementById('custom-alert-msg').innerText = msg;
                const btnOk = document.getElementById('alert-ok-btn');
                const btnCancel = document.getElementById('alert-cancel-btn');
                
                btnCancel.style.display = showCancel ? 'block' : 'none';
                
                const cleanup = () => { btnOk.onclick = null; btnCancel.onclick = null; dialog.close(); };
                btnOk.onclick = () => { cleanup(); resolve(true); };
                btnCancel.onclick = () => { cleanup(); resolve(false); };
                dialog.showModal();
            });
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2000); 
        }

        function renderPlayerChips(roomPlayersData = {}) {
            const container = document.getElementById('player-chips'); container.innerHTML = '';
            let players = []; let isMap = false;
            if (Array.isArray(roomPlayersData)) { players = roomPlayersData; } 
            else if (typeof roomPlayersData === 'object' && roomPlayersData !== null) { players = Object.keys(roomPlayersData); isMap = true; }
            
            players.forEach(p => {
                let chip = document.createElement('div'); chip.className = 'chip'; chip.textContent = p;
                chip.onclick = () => {
                    document.getElementById('player-input').value = p;
                    if (isMap && roomPlayersData[p]) document.getElementById('avatar-input').value = roomPlayersData[p];
                    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active');
                };
                container.appendChild(chip);
            });
        }
        
        function renderRoomChips(rooms) {
            const container = document.getElementById('room-chips'); container.innerHTML = '';
            rooms.forEach(r => {
                let chip = document.createElement('div'); chip.className = 'chip'; chip.textContent = r;
                chip.onclick = () => {
                    document.getElementById('room-input').value = r;
                    // ✨ 觸發輸入框的變更事件，以更新回合制鎖定狀態
                    document.getElementById('room-input').dispatchEvent(new Event('input'));
                    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active');
                };
                container.appendChild(chip);
            });
        }

        // ✨ 新增：處理大廳與重新開始選單的回合制下拉顯示
        document.getElementById('lobby-turn-cb').addEventListener('change', (e) => {
            document.getElementById('lobby-rounds-sel').style.display = e.target.checked ? 'block' : 'none';
        });
        document.getElementById('restart-turn-cb').addEventListener('change', (e) => {
            document.getElementById('restart-rounds-sel').style.display = e.target.checked ? 'block' : 'none';
        });

        listenToGlobalRooms();
        function listenToGlobalRooms() {
            const docRef = doc(db, "system_meta", "active_rooms");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    globalRoomData = docSnap.data(); renderRoomChips(Object.keys(globalRoomData));
                    const currentInput = document.getElementById('room-input').value;
                    if (currentInput) document.getElementById('room-input').dispatchEvent(new Event('input'));
                }
            });
        }

        document.getElementById('room-input').addEventListener('input', async (e) => {
            const selectedRoom = e.target.value.trim();
            const isExistingRoom = selectedRoom && globalRoomData[selectedRoom];
            
            const setupRow = document.getElementById('lobby-setup-row');
            const turnStatus = document.getElementById('lobby-turn-status');
            
            if (isExistingRoom) {
                setupRow.style.display = 'none';
                turnStatus.style.display = 'block';
                turnStatus.innerHTML = "⏳ 讀取房間狀態中...";
                turnStatus.style.color = "#9ca3af";
                
                const snap = await getDoc(doc(db, "room_states", selectedRoom));
                if (snap.exists()) {
                    let data = snap.data();
                    if (data.maxRounds > 0) {
                        turnStatus.innerHTML = `🏁 房間模式：回合制 (${data.maxRounds} 回合)`;
                        turnStatus.style.color = '#fbbf24';
                    } else {
                        turnStatus.innerHTML = `♾️ 房間模式：無限制 (一般模式)`;
                        turnStatus.style.color = '#9ca3af';
                    }
                }
                renderPlayerChips(globalRoomData[selectedRoom]);
            } else {
                setupRow.style.display = 'flex';
                turnStatus.style.display = 'none';
                renderPlayerChips([]);
            }
        });
        
        function updateUI() {
            const turnInfo = document.getElementById('turn-info'); 
            const msgInput = document.getElementById('msg-input');
            const sendBtn = document.getElementById('send-btn'); 
            const refBtn = document.getElementById('referee-btn');
            const hintBtn = document.getElementById('hint-btn'); 
            const sosBtn = document.getElementById('sos-btn');
            const surBtn = document.getElementById('surrender-btn'); 
            const startOverlay = document.getElementById('start-overlay'); 

            let roundInfoStr = "";
            if (gameState.maxRounds && gameState.maxRounds > 0) {
                roundInfoStr = `<div style="color: #fbbf24; font-size: 15px; font-weight: bold; margin-bottom: 5px; background: rgba(0,0,0,0.3); display: inline-block; padding: 4px 10px; border-radius: 6px;">⏳ 回合制比賽：目前第 ${gameState.currentRound} / ${gameState.maxRounds} 回合</div><br>`;
            }

            const myInfoPrefix = `${roundInfoStr}<div style="color: #ccc; font-size: 13px; margin-bottom: 5px;">🏠 房間：${currentRoom} | 👤 ${currentAvatar} ${currentPlayer}</div>`;

            if (gameState.isGameOver) {
                turnInfo.innerHTML = `${myInfoPrefix}🏁 遊戲結束！請在選單點擊重新開始。`; turnInfo.style.color = "#ef4444";
                msgInput.disabled = true; msgInput.placeholder = "遊戲已結算";
                sendBtn.disabled = true; refBtn.disabled = true; hintBtn.disabled = true; sosBtn.disabled = true; surBtn.disabled = true; startOverlay.style.display = "none";
                return;
            }

            let isMyTurn = false; 
            let playersOrder = gameState.playersOrder || [];
            let scores = gameState.scores || {};
            let roundHints = gameState.roundHints || {};
            
            const hasStarted = !!gameState.lastIdiom || !!gameState.pendingIdiom;

            startOverlay.style.display = (!hasStarted && !gameState.isGameOver) ? "flex" : "none";

            if (!hasStarted) {
                isMyTurn = true; 
            } else if (playersOrder.length <= 1) {
                isMyTurn = true; 
            } else {
                isMyTurn = (gameState.currentTurn === currentPlayer);
            }

            let hasChat = chatHistory.some(m => m.type === 'chat');
            refBtn.disabled = (gameState.alreadyJudged || !hasChat || gameState.isGameOver);

            let sosString = ""; let remainingSos = 0;
            if (gameState.sosUser) { 
                remainingSos = 3 - gameState.sosCount; 
                sosString = ` <span style="color: #eab308;">(🚨 逃生中：剩 ${remainingSos} 次)</span>`; 
            }

            let targetWord = gameState.rejected ? gameState.lastIdiom : gameState.pendingIdiom;
            if (!targetWord) targetWord = "";

            if (isMyTurn) {
                if (hasStarted) {
                    turnInfo.innerHTML = `${myInfoPrefix}🟢 輪到你了！接續「${targetWord}」${sosString}`;
                    msgInput.placeholder = gameState.sosUser === currentPlayer ? `🚨 逃生第 ${gameState.sosCount + 1} 擊！請接「${targetWord}」...` : `🟢 輪到你囉，請接「${targetWord}」...`;
                } else {
                    turnInfo.innerHTML = `${myInfoPrefix}🟢 尚未開局，任何人皆可出題！`; msgInput.placeholder = "你是第一個，請出題開局...";
                }
                turnInfo.style.color = "#4CAF50"; msgInput.disabled = false; sendBtn.disabled = false; surBtn.disabled = false;
                
                let myScore = scores[currentPlayer] || 0;
                let myHints = roundHints[currentPlayer] || 0;
                if (myHints === 0) { hintBtn.textContent = "💡 提示 (1/2)"; hintBtn.disabled = (myScore <= 5); } 
                else if (myHints === 1) { hintBtn.textContent = "💡 提示 (2/2)"; hintBtn.disabled = (myScore <= 5); } 
                else { hintBtn.textContent = "🚫 提示耗盡"; hintBtn.disabled = true; }
                sosBtn.disabled = !!gameState.sosUser;
            } else {
                let currentActor = gameState.currentTurn || '其他人';
                if (hasStarted) {
                    turnInfo.innerHTML = `${myInfoPrefix}⏳ 等待 ${currentActor} 接「${targetWord}」${sosString}`;
                    msgInput.placeholder = gameState.sosUser === currentActor ? `🚨：${currentActor} 逃生中 (剩 ${remainingSos} 次)...` : `⏳ 等待 ${currentActor} 接「${targetWord}」...`;
                } else { turnInfo.innerHTML = `${myInfoPrefix}⏳ 等待開局...`; msgInput.placeholder = "等待任何人出題..."; }
                
                turnInfo.style.color = "gray"; msgInput.disabled = true; sendBtn.disabled = true; hintBtn.disabled = true; sosBtn.disabled = true; surBtn.disabled = true;
                hintBtn.textContent = "💡 提示";
            }
        }

        function triggerFlashyEffect(userName, text) {
            const overlay = document.getElementById('idiom-overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <div style="color:#fff; font-size:28px; position:absolute; top:20%; font-weight:bold; letter-spacing: 3px;">👤 ${userName} 使出...</div>
                <div id="idiom-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; justify-items: center; align-items: center; margin-top: 30px;"></div>
            `;
            [...text].forEach((char, i) => {
                setTimeout(() => {
                    const charDiv = document.createElement('div'); charDiv.className = 'idiom-char animate-char';
                    charDiv.style.lineHeight = "1"; charDiv.textContent = char;
                    document.getElementById('idiom-grid').appendChild(charDiv);
                }, i * 500); 
            });

            const input = document.getElementById('msg-input'); const btn = document.getElementById('send-btn');
            input.disabled = true; btn.disabled = true;
            setTimeout(() => { overlay.style.display = 'none'; updateUI(); }, 3000);
        }

        async function apiCall(endpoint, bodyData) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bodyData) });
                if (!res.ok) { const err = await res.json(); await showModalAlert("系統提示：" + err.detail); return false; }
                return true;
            } catch(e) { await showModalAlert("連線後端失敗！"); return false; }
        }

        document.getElementById('join-btn').addEventListener('click', async () => {
            currentRoom = document.getElementById('room-input').value.trim();
            currentPlayer = document.getElementById('player-input').value.trim();
            currentAvatar = document.getElementById('avatar-input').value;
            if (!currentRoom || !currentPlayer) return await showModalAlert("⚠️ 請填寫房間名稱與名字！");

            let isExistingRoom = !!globalRoomData[currentRoom];
            let roomData = globalRoomData[currentRoom]; let isNameTaken = false;
            
            if (roomData) {
                if (Array.isArray(roomData)) isNameTaken = roomData.includes(currentPlayer);
                else isNameTaken = Object.keys(roomData).includes(currentPlayer);
            }

            if (isNameTaken) {
                const confirmMsg = `⚠️ 名字撞了！「${currentPlayer}」已經在這個房間裡了喔！\n\n👉 如果你是「斷線重新連線」，請按【確定】繼續。\n👉 如果你是「新玩家」，請按【取消】並更換一個名字。`;
                if (!(await showModalAlert(confirmMsg, true))) return; 
            }

            // ✨ 抓取設定的回合數 (若是既有房間，後端會自動忽略這項參數)
            let applyMaxRounds = 0;
            if (!isExistingRoom && document.getElementById('lobby-turn-cb').checked) {
                applyMaxRounds = parseInt(document.getElementById('lobby-rounds-sel').value);
            }

            let savedPlayers = JSON.parse(localStorage.getItem('savedPlayers') || '[]');
            if(!savedPlayers.includes(currentPlayer)) { savedPlayers.push(currentPlayer); localStorage.setItem('savedPlayers', JSON.stringify(savedPlayers)); }

            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('menu-btn').style.display = 'block';

            let hasShownGameOver = false; 
            const stateRef = doc(db, "room_states", currentRoom);
            
               onSnapshot(stateRef, (docSnap) => {
                if (docSnap.exists()) {
                    let newState = docSnap.data();
                    const verifyDialog = document.getElementById('final-verify-dialog');
    
                    // ✨ 更新：最終回合驗證跳窗 (加入「等聊天紀錄同步」與「防搶拍」機制)
                    if (newState.isVerifyingLastMove && !newState.isGameOver) {
                        const myVotes = newState.verificationVotes || [];
                        
                        if (!myVotes.includes(currentPlayer) && !verifyDialog.open) {
                            
                            const showFinalVerify = () => {
                                // 1. 找出最後一筆「成語對話」的索引位置
                                let lastChatIndex = -1;
                                for (let i = chatHistory.length - 1; i >= 0; i--) {
                                    if (chatHistory[i].type === "chat") {
                                        lastChatIndex = i;
                                        break;
                                    }
                                }
                                let lastChat = lastChatIndex >= 0 ? chatHistory[lastChatIndex] : null;
                                
                                // 2. 檢查在這筆對話「之後」，有沒有被裁判打 ❌ 的紀錄
                                let isRejectedAfter = false;
                                for (let i = lastChatIndex + 1; i < chatHistory.length; i++) {
                                    if (chatHistory[i].type === "referee" && chatHistory[i].text.includes("❌")) {
                                        isRejectedAfter = true;
                                        break;
                                    }
                                }

                                // 3. 終極防護：確認我們抓到的是「最新的、沒被退件的、跟當前狀態一致的」發言
                                let isChatSynced = lastChat && 
                                                   !isRejectedAfter && 
                                                   lastChat.text === newState.pendingIdiom && 
                                                   lastChat.user_name === newState.lastChatUser;

                                if (!isChatSynced) {
                                    setTimeout(showFinalVerify, 300); 
                                    return;
                                }
                                
                                let msgId = lastChat.id;
                                let willAnimate = lastChat.text.length === 4 && window.lastAnimatedMsgId !== msgId;

                                // ✨ 新增核心修正：檢查加分跳窗 (Toast) 是否還在畫面上
                                // 我們去檢查 toast-container 裡面還有沒有子元素
                                const toastContainer = document.getElementById('toast-container');
                                const isToastShowing = toastContainer && toastContainer.childElementCount > 0;

                                // 💡 判斷條件：如果正在播特效、準備播特效，或是加分跳窗還沒消失，就繼續延後 0.3 秒再檢查
                                if (window.isAnimating || willAnimate || isToastShowing) {
                                    setTimeout(showFinalVerify, 300);
                                    return;
                                }

                                const textContainer = document.getElementById('final-verify-text');
                                textContainer.innerHTML = `
                                    最後一個玩家 <b>${lastChat.user_name}</b> 的成語：<br>
                                    <span style="font-size:26px; color:#FFD700; font-weight:900;">「${lastChat.text}」</span><br>
                                    有人要提出裁判申請嗎？
                                `;
                                
                                if (!verifyDialog.open) verifyDialog.showModal();
                            };

                            // ✨ 漏掉的呼叫與括號補在這裡！
                            showFinalVerify();

                        } else if (myVotes.includes(currentPlayer) && verifyDialog.open) {
                            verifyDialog.close();
                        }
                    } else if (verifyDialog.open) {
                        verifyDialog.close();
                    }
                    
                    // ✨ 確保玩家真的成功加入過才踢出，避免網路時間差誤判
                    if (newState.playersOrder && newState.playersOrder.includes(currentPlayer)) {
                        window.hasJoinedSuccessfully = true;
                    }
                    if (window.hasJoinedSuccessfully && newState.playersOrder && !newState.playersOrder.includes(currentPlayer) && document.getElementById('game-screen').style.display === 'block') {
                        showToast("你已被移除或已退出房間", "warning");
                        setTimeout(() => window.location.reload(), 1500);
                        return;
                    }
                    
                    if (newState.isGameOver && !hasShownGameOver) {
                        hasShownGameOver = true; 

                        if (newState.surrenderUser) {
                            showModalAlert(`🏳️ 遊戲結算\n\n${newState.surrenderUser} 接不出來，舉白旗投降了！`);
                        } else {
                            let scoreEntries = Object.entries(newState.scores || {});
                            scoreEntries.sort((a, b) => b[1] - a[1]); 
                            
                            // ✨ 重新設計的同分排名邏輯
                            let currentRank = 0;
                            let lastScore = -1;
                            let rankingList = scoreEntries.map((e, index) => {
                                // 如果分數跟前一個人不同，名次才增加
                                if (e[1] !== lastScore) {
                                    currentRank = index + 1;
                                }
                                lastScore = e[1];

                                let medal = currentRank === 1 ? "🥇" : (currentRank === 2 ? "🥈" : (currentRank === 3 ? "🥉" : "👤"));
                                return `${medal} 第 ${currentRank} 名：${e[0]} (${e[1]}分)`;
                            }).join("\n");
                            
                            let reason = (newState.maxRounds > 0 && newState.currentRound >= newState.maxRounds) 
                                ? `⏱️ 已達最高回合限制 (${newState.maxRounds} 回合)` 
                                : `☠️ 有人分數歸零了！`;

                            showModalAlert(`🏁 遊戲結算：${reason}\n\n【最終排名紀錄】\n${rankingList}`);
                        }
                    }
                    
                    if (!newState.isGameOver) hasShownGameOver = false;

                    if (previousScores !== null) {
                        let pendingToasts = [];
                        let oldScores = previousScores || {};
                        let newScores = newState.scores || {};
                        
                        // ✨ 新增：用來追蹤這回合是不是「正常接龍發言」
                        let isTurnAction = false; 
                        
                        for (let player in newScores) {
                            let oldScore = oldScores[player] || 50;
                            let newScore = newScores[player];
                            let diff = newScore - oldScore;
                            
                            if (diff > 0) {
                                pendingToasts.push({ text: `🎉 ${player} +${diff} 分`, type: "success" });
                                // ✨ 如果加分是大於等於 10 分 (正常+10, 同字+20)，代表玩家送出了成語！
                                // 如果是裁判還清白的 +5 分，就不會觸發動畫延遲
                                if (diff >= 10) isTurnAction = true; 
                            }
                            else if (diff < 0) {
                                pendingToasts.push({ text: `💥 ${player} ${diff} 分`, type: "danger" });
                            }
                        }
                        
                        let newIdiom = newState.pendingIdiom;
                        
                        // ✨ 修正：不再比對字串一不一樣，而是看這回合有沒有人「因為接龍而加分」
                        let willAnimate = (isTurnAction && newIdiom && newIdiom.length === 4);
                        
                        let toastDelay = willAnimate ? 3200 : 0; 
                        setTimeout(() => {
                            pendingToasts.forEach(t => showToast(t.text, t.type));
                        }, toastDelay);
                    }
                    
                    previousScores = { ...(newState.scores || {}) };
                    previousPendingIdiom = newState.pendingIdiom;
                    gameState = newState;

                    let scores = gameState.scores || {};
                    let scoreHTML = Object.entries(scores).sort((a,b)=>b[1]-a[1]).map(e => `<span>${e[0]}: ${e[1]}分</span>`).join(' | ');
                    document.getElementById('scoreboard').innerHTML = `🏆 排行榜：${scoreHTML || '尚無資料'}`;
                    updateUI();
                } else {
                    // ✨ 情況 B：最後一人離開，房間狀態文件已被後端徹底刪除
                    if (window.hasJoinedSuccessfully && document.getElementById('game-screen').style.display === 'block') {
                        showToast("房間已結束並清空", "warning");
                        setTimeout(() => window.location.reload(), 1200);
                    } else {
                        // 剛開房的瞬間，給予預設狀態
                        gameState = { scores: {}, playersOrder: [], currentTurn: null, lastIdiom: null, pendingIdiom: null, rejected: false, sosUser: null, sosCount: 0, isGameOver: false, alreadyJudged: false, roundHints: {}, maxRounds: 0, currentRound: 0 };
                        updateUI();
                    }
                }
            });

            const q = query(collection(db, "chat_messages"), where("room_name", "==", currentRoom), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = ""; 
                
                // ✨ 1. 先把所有訊息抓出來存成陣列
                let rawDocs = [];
                snapshot.forEach((doc) => {
                    const msg = doc.data(); 
                    msg.id = doc.id; 
                    rawDocs.push(msg);
                });

                // ✨ 2. 手動排序：如果時間完全一樣，強迫「玩家成語 (chat)」排在「系統提醒 (system)」前面
                // 這樣可以解決提醒文字卡在成語中間的問題，也能確保動畫邏輯抓到正確的最後一筆成語
                rawDocs.sort((a, b) => {
                    let tA = a.timestamp && a.timestamp.toMillis ? a.timestamp.toMillis() : Date.now();
                    let tB = b.timestamp && b.timestamp.toMillis ? b.timestamp.toMillis() : Date.now();
                    if (tA === tB) {
                        if (a.type === "chat" && b.type === "system") return -1;
                        if (a.type === "system" && b.type === "chat") return 1;
                    }
                    return tA - tB;
                });

                chatHistory = rawDocs;
                let currentValidIdiom = null; let currentPendingIdiom = null; let currentRejected = false;
                
                // ✨ 3. 使用排好序的 chatHistory 開始處理邏輯與畫面
                chatHistory.forEach((msg) => {
                    // 安全過濾字串
                    const safeText = escapeHTML(msg.text);
                    const safeUserName = escapeHTML(msg.user_name);

                    const isSelf = msg.user_name === currentPlayer;
                    const isSystem = ["system", "join_room", "game_over", "sos_start", "referee"].includes(msg.type);
                    let mType = msg.type || "chat";
                    
                    // 遊戲邏輯比對 (接龍狀態追蹤)
                    if (mType === "system" && safeText.includes("題目為")) {
                        let match = safeText.match(/「\*\*([^]+?)\*\*」/); 
                        currentValidIdiom = match ? match[1] : safeText.slice(-4);
                        currentPendingIdiom = currentValidIdiom; currentRejected = false;
                    } else if (mType === "chat" && msg.user_name !== "System" && !msg.user_name.includes("AI")) {
                        if (!currentRejected) currentValidIdiom = currentPendingIdiom;
                        currentPendingIdiom = safeText; currentRejected = false;
                    } else if (mType === "referee" && safeText.includes("❌")) { 
                        currentRejected = true; 
                    }

                    let wrapperClass = isSystem ? "system" : (isSelf ? "self" : "other");
                    let msgClass = msg.type || "chat";
                    if (!isSystem) msgClass += isSelf ? " self" : " other";
                    if (mType === "system" && safeText.includes("題目為")) msgClass += " topic-prompt";

                    let displayText = safeText;
                    if (mType === "join_room" || mType === "sos_start") displayText = `${msg.avatar || '😎'} ${safeUserName} ${safeText}`;
                    if (mType === "system" && safeText.includes("3 連擊逃脫成功")) msgClass += " combo-success";

                    const isLeft = gameState.playersOrder && !gameState.playersOrder.includes(msg.user_name) && !isSystem && msg.user_name !== "System" && !msg.user_name.includes("AI");
                    let nameSuffix = isLeft ? " <span style='font-size:10px; color:#ef4444;'>(已離開)</span>" : "";
                    let opacityStyle = isLeft ? "opacity: 0.5; filter: grayscale(50%);" : "";

                    let infoHtml = (!isSystem) ? `<div class="msg-info">${msg.avatar || '😎'} ${safeUserName}${nameSuffix}</div>` : "";
                    
                    if (mType === "referee" && msg.requested_by) {
                        const safeRequestedBy = escapeHTML(msg.requested_by);
                        if (safeText.includes("✅") || safeText.includes("❌")) {
                            infoHtml = `<div class="msg-info" style="text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 6px;">👨‍⚖️ ${safeRequestedBy} 申請了裁判判決</div>`;
                        }
                    }

                    // 渲染到畫面上
                    chatBox.innerHTML += `
                        <div class="msg-wrapper ${wrapperClass}" style="${opacityStyle}">
                            ${infoHtml}
                            <div class="msg ${msgClass}">${displayText}</div>
                        </div>`;
                        
                    if (mType === "referee" && safeText.includes("❌")) {
                        let retryIdiom = currentValidIdiom || "自由出題";
                        chatBox.innerHTML += `<div class="msg-wrapper system"><div class="msg retry-prompt">🚨 判定失敗！請退回重接「${retryIdiom}」</div></div>`;
                    }
                });

                // 讓聊天室捲軸自動滾動到最下方
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // 4. 修正動畫觸發邏輯：
                // 不要只抓最後一筆訊息，而是「往回找」最新的一筆玩家發言 (type === "chat")
                // 這樣就算最後一筆是系統倒數提醒，動畫也能正常播放
                let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
                
                if (lastChat && lastChat.text.length === 4) {
                    let msgId = lastChat.id; // 使用資料庫產生的唯一 ID 避免重複播放
                    if (window.lastAnimatedMsgId !== msgId) {
                        window.isAnimating = true;
                        triggerFlashyEffect(lastChat.user_name, lastChat.text);
                        window.lastAnimatedMsgId = msgId;
                        
                        // 動畫播放時間約 3 秒，結束後解除鎖定
                        setTimeout(() => { window.isAnimating = false; }, 3200);
                    }
                }
            });

            // ✨ 將設定好的 max_rounds 傳給後端
            apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "join_room", text: "加入了房間 👋", avatar: currentAvatar, max_rounds: applyMaxRounds });
        });

        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('send-btn').click(); }
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const text = document.getElementById('msg-input').value.trim(); if (!text) return;
            let isSosFinishing = (gameState.sosUser === currentPlayer && gameState.sosCount === 2);
            let ignoreTone = (gameState.sosUser === currentPlayer && gameState.sosCount === 0);
            
            let validLastIdiom = gameState.rejected ? gameState.lastIdiom : gameState.pendingIdiom;

            let success = await apiCall('/send_chat', { room_name: currentRoom, user_name: currentPlayer, text, avatar: currentAvatar, last_idiom: validLastIdiom, ignore_tone: ignoreTone });
            if (success) {
                document.getElementById('msg-input').value = "";
                if (isSosFinishing) apiCall('/system_action', { room_name: currentRoom, user_name: "System", action_type: "system", text: `【系統】🎉 恭喜 **${currentPlayer}** 完成 3 連擊逃脫成功！`, avatar: "" });
            }
        });

        document.getElementById('referee-btn').addEventListener('click', async () => {
            let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
            if(!lastChat) return await showModalAlert("還沒有人發言！");
            
            const msg = "確定要呼叫 AI 裁判嗎？\n\n💡 功能說明：對上一句成語進行權威審查。\n【❌ 不是成語】：原發言者扣 20 分 (同字接龍扣 30 分)。\n【✅ 是成語】：原發言者獲得 5 分清白獎勵！";
            if (await showModalAlert(msg, true)) {
                apiCall('/call_referee', { room_name: currentRoom, user_name: currentPlayer, action_type: "call", text: "呼叫裁判", avatar: currentAvatar, target_text: lastChat.text });
            }
        });

        document.getElementById('hint-btn').addEventListener('click', async () => {
            let targetWord = gameState.rejected ? gameState.lastIdiom : gameState.pendingIdiom;
            if(!targetWord) return await showModalAlert("還沒有題目！");
            
            const msg = "確定要花費分數購買提示嗎？\n\n💡 功能說明：每次提示將扣除 5 分。\n第一階段：提供下一句建議成語的「第三個字」。\n第二階段：由 AI 進行成語意思解釋（不含標點與原字）。";
            
            if (await showModalAlert(msg, true)) {
                let myHints = (gameState.roundHints || {})[currentPlayer] || 0;
                let actionType = myHints === 0 ? "hint_1" : "hint_2"; 
                apiCall('/buy_hint', { room_name: currentRoom, user_name: currentPlayer, action_type: actionType, text: "買提示", avatar: currentAvatar, target_text: targetWord });
            }
        });

        document.getElementById('sos-btn').addEventListener('click', async () => {
            const msg = "確定要發動「換聲調求生」嗎？\n\n💡 功能說明：發動後進入 3 連擊模式。第一擊可無視聲調接龍（例如：ㄒㄧˊ 可接 ㄒㄧ），順利完成 3 連擊後可獲得額外積分並成功逃脫！";
            if (await showModalAlert(msg, true)) {
                apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "sos_start", text: "發動了「換聲調求生」！", avatar: currentAvatar });
            }
        });

        document.getElementById('big-random-btn').addEventListener('click', () => {
            apiCall('/random_topic', { room_name: currentRoom, user_name: currentPlayer, action_type: "random", text: "請求出題", avatar: currentAvatar });
        });
        
        document.getElementById('surrender-btn').addEventListener('click', async () => {
            if(await showModalAlert("確定要投降並結束這場遊戲嗎？", true)) {
                apiCall('/system_action', { room_name: currentRoom, user_name: currentPlayer, action_type: "game_over", text: "", avatar: currentAvatar });
            }
        });

        const menuDialog = document.getElementById('menu-dialog');
        document.getElementById('menu-btn').addEventListener('click', () => menuDialog.showModal());

        document.getElementById('btn-restart').addEventListener('click', async () => {
            // ✨ 重啟時決定新的回合制設定
            let applyMaxRounds = 0;
            if (document.getElementById('restart-turn-cb').checked) {
                applyMaxRounds = parseInt(document.getElementById('restart-rounds-sel').value);
            }

            if(await showModalAlert("確定要清空房間對話並重新開始嗎？\n(大廳的玩家角色將保留，並套用上方回合制新設定)", true)) {
                apiCall('/restart_game', { room_name: currentRoom, user_name: "System", action_type: "restart", text: "", avatar: "", max_rounds: applyMaxRounds });
                menuDialog.close();
            }
        });

        document.getElementById('btn-del-user').addEventListener('click', async () => {
            const targetUser = document.getElementById('target-user').value.trim();
            const pwd = document.getElementById('admin-pwd').value;
            if(!targetUser || !pwd) return await showModalAlert("請輸入密碼與玩家名稱！");
            if(await showModalAlert(`確定刪除 ${targetUser} 的紀錄？`, true)) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "delete_user", target_user: targetUser });
                if(success) { await showModalAlert("刪除成功！"); menuDialog.close(); }
            }
        });

        document.getElementById('btn-clear-room').addEventListener('click', async () => {
            const pwd = document.getElementById('admin-pwd').value;
            if(!pwd) return await showModalAlert("請輸入密碼！");
            if(await showModalAlert("🧨 確定要徹底毀滅此房間？資料與角色紀錄將全部消失！", true)) {
                let success = await apiCall('/admin_action', { room_name: currentRoom, admin_pwd: pwd, action_type: "clear_room" });
                if(success) { await showModalAlert("房間已徹底毀滅！"); window.location.reload(); }
            }
        });

        document.getElementById('chat-box').addEventListener('click', async (e) => {
            if (e.target.classList.contains('msg') && e.target.classList.contains('self')) {
                if (gameState.isGameOver) return;
                let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");

                if (lastChat && e.target.innerText === lastChat.text && lastChat.user_name === currentPlayer && gameState.lastChatUser === currentPlayer) {
                    if (gameState.alreadyJudged) return showToast("⚠️ 裁判已經出動，無法收回囉！", "warning");

                    let isPerfectMatch = gameState.lastChatWasPerfectMatch;
                    let penalty = isPerfectMatch ? 25 : 15;
                    const msg = `確定要收回「${lastChat.text}」嗎？\n\n💡 收回代價：\n您剛才是${isPerfectMatch ? '同字' : '同音'}接龍，\n收回將扣除 ${penalty} 分 (等同這回合原地扣 5 分)！`;

                    if (await showModalAlert(msg, true)) {
                        apiCall('/revoke_chat', { room_name: currentRoom, user_name: currentPlayer, action_type: "revoke", text: "收回發言", avatar: currentAvatar });
                    }
                } else {
                    showToast("⚠️ 只能收回自己最新且還沒被接下去的發言喔！", "warning");
                }
            }
        });
        
        document.getElementById('btn-leave-room').addEventListener('click', async () => {
            const msg = "🏃 確定要刪除角色並退出嗎？\n\n注意：您的分數將被永久清除。";
            if (await showModalAlert(msg, true)) {
                
                // ✨ 新增這行：確認離開後，先把設定選單關掉！
                document.getElementById('menu-dialog').close();
                
                apiCall('/admin_action', { 
                    room_name: currentRoom, 
                    admin_pwd: "", 
                    action_type: "delete_user", 
                    target_user: currentPlayer,
                    user_name: currentPlayer 
                });
            }
        });
        
        // ✨ 新增：最終驗證跳窗的按鈕功能
        
        // 1. 最終審查：申請裁判
        document.getElementById('final-referee-btn').addEventListener('click', async () => {
            document.getElementById('final-verify-dialog').close();
            let lastChat = [...chatHistory].reverse().find(m => m.type === "chat");
            if(lastChat) {
                apiCall('/call_referee', { 
                    room_name: currentRoom, 
                    user_name: currentPlayer, 
                    action_type: "call", 
                    text: "針對最終發言呼叫裁判", 
                    avatar: currentAvatar, 
                    target_text: lastChat.text 
                });
            }
        });

        // 2. 最終審查：不需要
        document.getElementById('final-no-btn').addEventListener('click', () => {
            // 發送一個「我投不用票」的訊號給後端
            apiCall('/system_action', { 
                room_name: currentRoom, 
                user_name: currentPlayer, 
                action_type: "final_vote_no", 
                text: "投票不需裁判", 
                avatar: currentAvatar 
            });
        });
        
    </script>
</body>
</html>
